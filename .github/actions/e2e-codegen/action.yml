name: E2E Codegen
description: Generate pikku files for all e2e packages (two-pass for cross-package resolution)

runs:
  using: composite
  steps:
    - name: Generate pikku files for e2e addons
      shell: bash
      run: |
        cd packages/addon/pikku-console && npx pikku all
        cd ../../..
        cd packages/addon/pikku-graph && npx pikku all
        cd ../../..
        cd e2e/packages/todos && npx pikku all
        cd ../../..
        cd e2e/packages/emails && npx pikku all
    - name: Generate pikku files for e2e hmac-signer
      shell: bash
      run: cd e2e/packages/hmac-signer && npx pikku all
    - name: Generate pikku files for e2e oauth-api
      shell: bash
      run: cd e2e/packages/oauth-api && npx pikku all
    - name: Generate pikku files for e2e project
      shell: bash
      run: cd e2e && npx pikku all
    - name: Regenerate pikku files (second pass resolves cross-package type imports)
      shell: bash
      run: |
        cd packages/addon/pikku-console && npx pikku all
        cd ../../..
        cd packages/addon/pikku-graph && npx pikku all
        cd ../../..
        cd e2e/packages/todos && npx pikku all
        cd ../../..
        cd e2e/packages/emails && npx pikku all
        cd ../../..
        cd e2e/packages/hmac-signer && npx pikku all
        cd ../../..
        cd e2e/packages/oauth-api && npx pikku all
        cd ../../..
        cd e2e && npx pikku all
