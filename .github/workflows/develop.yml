name: CI

on:
  push:
    branches-ignore:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# better-auth now throws on a missing BETTER_AUTH_SECRET (mapSession errors no
# longer swallowed), so every job that builds/prerenders/runs a template needs
# it present. Inherited by all jobs (build, templates, verifiers, e2e) and by
# spawned bundles via process.env. Build-only dummy, ≥32 chars — never a real secret.
env:
  BETTER_AUTH_SECRET: ci-build-only-better-auth-secret-not-real

jobs:
  validate-deps:
    name: Validate Package Deps
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Check published deps for workspace protocol
        run: node scripts/check-no-workspace-protocol.mjs
      - name: Check no publish-time CLI rebuild
        run: node scripts/check-no-publish-time-cli-rebuild.mjs

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
        with:
          download-build: 'false'
      - name: Check formatting
        run: yarn prettier
      - name: Lint
        run: yarn lint

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
        with:
          download-build: 'false'
      - uses: ./.github/actions/build

  codegen-perf:
    name: Codegen Perf (500 functions ≤ 30s)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - name: Run codegen perf gate
        run: npx tsx benchmarks/bench-codegen-perf.ts

  e2e:
    name: E2E Standard
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
    timeout-minutes: 10
    needs: build
    steps:
      - uses: actions/checkout@v7
      - name: Install native build tools
        run: apt-get update && apt-get install -y build-essential python3 unzip
      - uses: ./.github/actions/setup
      - uses: ./.github/actions/e2e-codegen
      - name: Run e2e tests
        run: yarn test:e2e --force-exit

  e2e-ai:
    name: E2E AI
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
    timeout-minutes: 30
    needs: build
    steps:
      - uses: actions/checkout@v7
      - name: Install native build tools
        run: apt-get update && apt-get install -y build-essential python3 unzip
      - uses: ./.github/actions/setup
      - uses: ./.github/actions/e2e-codegen
      - name: Run AI e2e tests
        run: yarn test:e2e:ai
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

  verifiers:
    name: Verifiers (${{ matrix.verifier }}, ${{ matrix.package-manager }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    strategy:
      fail-fast: false
      matrix:
        verifier:
          [
            addon,
            addon-treeshake,
            classification,
            gateway,
            middleware-and-permissions,
            treeshaking,
            types,
            secrets,
            workflows,
            variables,
            functions,
            hmr,
            dev-bun,
            deploy-cloudflare,
            deploy-serverless,
            deploy-azure,
            deploy-standalone,
            better-auth,
            bun-server,
          ]
        package-manager: [yarn, bun]
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: cd verifiers/${{ matrix.verifier }} && ${{ matrix.package-manager == 'bun' && 'bun run' || 'yarn' }} test

  verifiers-binary:
    name: Binary (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    needs: build
    strategy:
      fail-fast: false
      matrix:
        # windows-latest excluded: its pre-installed global Yarn 1.22 shadows
        # Corepack's Yarn 4 in the shared setup action, breaking `yarn install`.
        # The pikku-windows-x64.exe is still cross-compiled and published on each
        # release (see packages/cli/build.sh).
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Run binary verifier
        shell: bash
        run: cd verifiers/binary && yarn test

  # The workflow verifier's pg/redis runners need real queue + storage backends,
  # so they can't run in the plain `verifiers` job. This job gives them Postgres
  # (KyselyWorkflowService + pg-boss) and Redis (RedisWorkflowService + bullmq)
  # and asserts every node's state — provenance + cycles — on both transports.
  verifiers-workflows-db:
    name: Verifiers (workflows, db-backed)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    services:
      redis:
        image: redis
        ports:
          - 6379:6379
      postgres:
        image: postgres
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: pikku_queue
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: cd verifiers/workflows && yarn test:db
    env:
      DATABASE_URL: postgres://postgres:password@localhost:5432/pikku_queue
      REDIS_URL: redis://localhost:6379

  verifier-coverage:
    name: Verifier Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - name: Run functions verifier with coverage
        run: cd verifiers/functions && yarn test:coverage
      - name: Upload verifier coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: verifiers/functions/coverage/lcov.info
          flags: verifiers
          name: verifier-coverage
        continue-on-error: true

  unit-coverage:
    name: Unit Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - name: Run package unit tests with coverage
        # --enable-source-maps so tsx-transpiled line numbers map back to the
        # original .ts before lcov is written. A single package's test failure
        # must not halt the sweep, so each run is isolated with `|| warning`.
        env:
          NODE_OPTIONS: --enable-source-maps
        run: |
          : > unit-test-failures.txt
          while IFS= read -r script; do
            dir=$(dirname "$script")
            echo "::group::coverage ${dir}"
            (cd "$dir" && bash run-tests.sh --coverage) || { echo "::error::unit tests failed in ${dir}"; echo "$dir" >> unit-test-failures.txt; }
            echo "::endgroup::"
          done < <(find packages -name run-tests.sh -not -path '*/node_modules/*' | sort)
      - name: Merge lcov reports and re-root paths to repo root
        # Each package writes lcov.info with package-relative SF paths (src/...).
        # Prefix them with the package directory so Codecov maps them to the
        # correct file in a monorepo where many packages share src/index.ts.
        run: |
          : > unit-lcov.info
          while IFS= read -r f; do
            dir=$(dirname "$f")
            sed "s#^SF:#SF:${dir}/#" "$f" >> unit-lcov.info
          done < <(find packages -name lcov.info -not -path '*/node_modules/*' | sort)
          echo "Merged $(grep -c '^SF:' unit-lcov.info || echo 0) source files into unit-lcov.info"
      - name: Upload unit coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: unit-lcov.info
          flags: unit
          name: unit-coverage
        continue-on-error: true
      - name: Fail if any package's unit tests failed
        run: |
          if [ -s unit-test-failures.txt ]; then
            echo "Unit tests failed in:"; cat unit-test-failures.txt
            exit 1
          fi

  templates:
    name: Templates (${{ matrix.version }}, ${{ matrix.template }}, ${{ matrix.package-manager }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    services:
      redis:
        image: redis
        ports:
          - 6379:6379
      postgres:
        image: postgres
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: pikku_workspace_starter
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    strategy:
      fail-fast: false
      matrix:
        version: [24]
        template:
          [
            express,
            express-middleware,
            fastify,
            fastify-plugin,
            uws,
            ws,
            aws-lambda,
            aws-lambda-websocket,
            cloudflare-workers,
            cloudflare-websocket,
            nextjs,
            mcp-server,
            pg-boss,
            bullmq,
            workflows-bullmq,
            workflows-pg-boss,
            remote-rpc-pg,
            remote-rpc-redis,
            ai-postgres,
            bun,
          ]
        package-manager: [yarn, bun]
        exclude:
          - package-manager: bun
            template: uws
          - package-manager: bun
            template: aws-lambda
          - package-manager: bun
            template: aws-lambda-websocket
          - package-manager: bun
            template: cloudflare-workers
          - package-manager: bun
            template: cloudflare-websocket
          - package-manager: bun
            template: nextjs
          - package-manager: bun
            template: nextjs-full
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
        with:
          node-version: ${{ matrix.version }}
      - name: Test template
        timeout-minutes: 5
        run: ./scripts/test-template.sh "$TEMPLATE_NAME" "$TEMPLATE_VERSION" "$PACKAGE_MANAGER"
        env:
          TEMPLATE_NAME: ${{ matrix.template }}
          TEMPLATE_VERSION: ${{ github.ref_name }}
          PACKAGE_MANAGER: ${{ matrix.package-manager }}
          TEMPLATE_V8_COVERAGE_DIR: ${{ runner.temp }}/template-coverage/${{ matrix.template }}/raw
      - name: Generate template coverage report
        if: always()
        run: |
          if find "${{ runner.temp }}/template-coverage/${{ matrix.template }}/raw" -type f -name '*.json' -print -quit >/dev/null 2>&1; then
            npx --yes c8@11.0.0 report \
              --temp-directory "${{ runner.temp }}/template-coverage/${{ matrix.template }}/raw" \
              --reporter=lcov \
              --report-dir "${{ runner.temp }}/template-coverage/${{ matrix.template }}/report" \
              --exclude '.pikku/**' \
              --exclude 'client/**' \
              --exclude 'src/tests/**'
          fi
      - name: Upload template coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v7
        with:
          files: ${{ runner.temp }}/template-coverage/${{ matrix.template }}/report/lcov.info
          flags: templates
          name: template-${{ matrix.template }}
        continue-on-error: true
    env:
      SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}
      DATABASE_URL: postgres://postgres:password@localhost:5432/pikku_workspace_starter
      REDIS_URL: redis://localhost:6379
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SLS_TELEMETRY_DISABLED: 1
      SLS_NOTIFICATIONS_MODE: off
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  templates-no-services:
    name: Templates (${{ matrix.version }}, ${{ matrix.template }}, ${{ matrix.package-manager }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    strategy:
      fail-fast: false
      matrix:
        version: [24]
        template: [cli]
        package-manager: [yarn]
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
        with:
          node-version: ${{ matrix.version }}
      - name: Test template
        timeout-minutes: 5
        run: ./scripts/test-template.sh ${{ matrix.template }} ${{ github.ref_name }}
        env:
          TEMPLATE_V8_COVERAGE_DIR: ${{ runner.temp }}/template-coverage/${{ matrix.template }}/raw
      - name: Generate template coverage report
        if: always()
        run: |
          if find "${{ runner.temp }}/template-coverage/${{ matrix.template }}/raw" -type f -name '*.json' -print -quit >/dev/null 2>&1; then
            npx --yes c8@11.0.0 report \
              --temp-directory "${{ runner.temp }}/template-coverage/${{ matrix.template }}/raw" \
              --reporter=lcov \
              --report-dir "${{ runner.temp }}/template-coverage/${{ matrix.template }}/report" \
              --exclude '.pikku/**' \
              --exclude 'client/**' \
              --exclude 'src/tests/**'
          fi
      - name: Upload template coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v7
        with:
          files: ${{ runner.temp }}/template-coverage/${{ matrix.template }}/report/lcov.info
          flags: templates
          name: template-${{ matrix.template }}
        continue-on-error: true
    env:
      SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SLS_TELEMETRY_DISABLED: 1
      SLS_NOTIFICATIONS_MODE: off
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  template-runtime-targets:
    name: Template Functions Runtimes (${{ matrix.version }}, ${{ matrix.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    services:
      elasticmq:
        image: softwaremill/elasticmq-native
        ports:
          - 9324:9324
    strategy:
      fail-fast: false
      matrix:
        version: [24]
        target: [dev, standalone]
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
        with:
          node-version: ${{ matrix.version }}
      - name: Test functions template runtime target
        timeout-minutes: 5
        run: cd templates/functions && yarn test:runtime ${{ matrix.target }}
        env:
          AWS_ACCESS_KEY_ID: local
          AWS_SECRET_ACCESS_KEY: local
          AWS_REGION: us-east-1
          SLS_TELEMETRY_DISABLED: 1
          SLS_NOTIFICATIONS_MODE: off
