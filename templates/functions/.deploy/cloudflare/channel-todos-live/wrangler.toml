#:schema node_modules/wrangler/config-schema.json
name = "functions-channel-todos-live"
main = "bundle.js"
compatibility_date = "2024-12-18"
compatibility_flags = ["nodejs_compat_v2"]

[observability]
enabled = true

[[durable_objects.bindings]]
name = "WEBSOCKET_HIBERNATION_SERVER"
class_name = "WebSocketHibernationServer"

[[migrations]]
tag = "v1"
new_classes = ["WebSocketHibernationServer"]

[[services]]
binding = "ON_CONNECT"
service = "functions-on-connect"

[[services]]
binding = "ON_DISCONNECT"
service = "functions-on-disconnect"

[[services]]
binding = "SUBSCRIBE"
service = "functions-subscribe"

[[services]]
binding = "UNSUBSCRIBE"
service = "functions-unsubscribe"

[[services]]
binding = "LIST_TODOS"
service = "functions-list-todos"

[[services]]
binding = "CREATE_TODO"
service = "functions-create-todo"

[[services]]
binding = "COMPLETE_TODO"
service = "functions-complete-todo"
