name: Main

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      - run: corepack enable
        shell: bash
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn
      - run: yarn install
      - run: yarn build
      - run: yarn test:coverage
      - run: yarn prettier
      - run: yarn lint
      - run: cd templates/functions && yarn pikku && cd ../..
      - run: cd packages/console && yarn generate && yarn tsc --noEmit
      - run: yarn build:console

      - name: Save build output (for later jobs)
        uses: actions/upload-artifact@v4
        with:
          name: built-packages
          path: |
            packages/**/dist
            packages/**/bin
          include-hidden-files: true
          retention-days: 1

      - name: Coveralls GitHub Action
        uses: coverallsapp/github-action@v2.3.4
        continue-on-error: true

  verifiers:
    name: Verifiers
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        verifier:
          [
            addon,
            gateway,
            middleware-and-permissions,
            treeshaking,
            types,
            secrets,
            workflows,
            variables,
            functions,
            hmr,
            deploy-cloudflare,
            deploy-serverless,
            deploy-azure,
          ]
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      - run: corepack enable
        shell: bash
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn
      - name: Download built packages
        uses: actions/download-artifact@v4
        with:
          name: built-packages
          path: packages
      - run: yarn install
      - run: cd templates/function-addon && yarn pikku && yarn build
      - run: cd verifiers/${{ matrix.verifier }} && yarn test

  templates:
    name: Templates
    runs-on: ubuntu-latest
    needs: build
    services:
      redis:
        image: redis
        ports:
          - 6379:6379
      postgres:
        image: postgres
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: pikku_workspace_starter
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    strategy:
      fail-fast: false
      matrix:
        version: [24]
        template:
          [
            express,
            express-middleware,
            fastify,
            fastify-plugin,
            uws,
            ws,
            aws-lambda,
            aws-lambda-websocket,
            cloudflare-workers,
            cloudflare-websocket,
            nextjs,
            mcp-server,
            cli,
            pg-boss,
            bullmq,
            workflows-bullmq,
            workflows-pg-boss,
            remote-rpc-pg,
            remote-rpc-redis,
            ai-postgres,
          ]
        package-manager: [yarn]
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      - run: corepack enable
        shell: bash
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.version }}
          cache: yarn
      - name: Download built packages
        uses: actions/download-artifact@v4
        with:
          name: built-packages
          path: packages
      - name: Install dependencies for create
        run: yarn install # TODO: This should only need to install create
      - name: Test template
        timeout-minutes: 2
        run: ./scripts/test-template.sh ${{ matrix.template }} ${{ github.ref_name }}
    env:
      SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}
      DATABASE_URL: postgres://postgres:password@localhost:5432/pikku_workspace_starter
      REDIS_URL: redis://localhost:6379
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SLS_TELEMETRY_DISABLED: 1
      SLS_NOTIFICATIONS_MODE: off

  e2e:
    name: E2E Standard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      - run: corepack enable
        shell: bash
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn
      - name: Download built packages
        uses: actions/download-artifact@v4
        with:
          name: built-packages
          path: packages
      - run: yarn install
      - name: Generate pikku files for e2e addons
        run: |
          cd packages/addon/pikku-console && npx pikku all
          cd ../../..
          cd packages/addon/pikku-graph && npx pikku all
          cd ../../..
          cd e2e/packages/todos && npx pikku all
          cd ../../..
          cd e2e/packages/emails && npx pikku all
      - name: Generate pikku files for e2e hmac-signer
        run: cd e2e/packages/hmac-signer && npx pikku all
      - name: Generate pikku files for e2e oauth-api
        run: cd e2e/packages/oauth-api && npx pikku all
      - name: Generate pikku files for e2e project
        run: cd e2e && npx pikku all
      - name: Install Playwright
        run: npx playwright install --with-deps chromium
      - name: Run e2e tests
        run: yarn test:e2e --force-exit

