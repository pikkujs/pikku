#:schema node_modules/wrangler/config-schema.json
name = "functions-wf-create-and-notify-workflow"
main = "bundle.js"
compatibility_date = "2024-12-18"
compatibility_flags = ["nodejs_compat_v2"]

[observability]
enabled = true

[[d1_databases]]
binding = "WORKFLOW_DB"
database_name = "functions-workflow-db"
database_id = "pikku"

[[queues.producers]]
binding = "TODO_REMINDERS"
queue = "functions-todo-reminders"

[[services]]
binding = "CREATE_TODO"
service = "functions-create-todo"

[[services]]
binding = "SEND_NOTIFICATION"
service = "functions-send-notification"

[[services]]
binding = "SCHEDULE_REMINDER"
service = "functions-schedule-reminder"
