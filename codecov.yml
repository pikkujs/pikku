coverage:
  status:
    patch:
      default:
        # `node --experimental-test-coverage` + tsx misattributes line hits
        # for multi-line calls (e.g. multi-arg `e(...)` validators), so patch
        # coverage is systematically under-reported even when every new branch
        # is exercised by a passing test. The threshold absorbs that artifact
        # while still failing genuinely under-tested diffs.
        target: auto
        threshold: 25%

ignore:
  - "packages/cli/src/functions/db/postgres/**"
  - "packages/inspector/src/utils/workflow/dsl/extract-dsl-workflow.ts"
  # Compile-only wiring aggregator — imported for type-checking, never executed
  # at runtime (the verifier boots via the generated bootstrap), so it has no
  # coverable lines.
  - "verifiers/functions/src/index.ts"

flags:
  unit:
    paths:
      - packages/
    carryforward: false
  templates:
    paths:
      - packages/
    carryforward: false
  verifiers:
    paths:
      - verifiers/functions/src/
    carryforward: false
