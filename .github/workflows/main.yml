name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

# better-auth now throws on a missing BETTER_AUTH_SECRET (mapSession errors no
# longer swallowed), so every job that builds/prerenders/runs a template needs
# it present. Inherited by all jobs (build, templates, verifiers, e2e) and by
# spawned bundles via process.env. Build-only dummy, ≥32 chars — never a real secret.
env:
  BETTER_AUTH_SECRET: ci-build-only-better-auth-secret-not-real

jobs:
  validate-deps:
    name: Validate Package Deps
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Check published deps for workspace protocol
        run: node scripts/check-no-workspace-protocol.mjs
      - name: Check no publish-time CLI rebuild
        run: node scripts/check-no-publish-time-cli-rebuild.mjs

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
        with:
          download-build: 'false'
      - name: Check formatting
        run: yarn prettier
      - name: Lint
        run: yarn lint

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
        with:
          download-build: 'false'
      - uses: ./.github/actions/build

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: yarn test

  e2e:
    name: E2E Standard
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
    timeout-minutes: 10
    needs: build
    steps:
      - uses: actions/checkout@v7
      - name: Install native build tools
        run: apt-get update && apt-get install -y build-essential python3 unzip
      - uses: ./.github/actions/setup
      - uses: ./.github/actions/e2e-codegen
      - name: Run e2e tests
        run: yarn test:e2e --force-exit

  # e2e-ai:
  #   name: E2E AI
  #   runs-on: ubuntu-latest
  #   container:
  #     image: mcr.microsoft.com/playwright:v1.58.2-noble
  #   timeout-minutes: 10
  #   needs: [e2e, verifiers, templates]
  #   steps:
  #     - uses: actions/checkout@v7
  #     - name: Install native build tools
  #       run: apt-get update && apt-get install -y build-essential python3
  #     - uses: ./.github/actions/setup
  #     - uses: ./.github/actions/e2e-codegen
  #     - name: Run AI e2e tests
  #       run: yarn test:e2e:ai
  #       env:
  #         OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

  verifiers:
    name: Verifiers (${{ matrix.verifier }}, ${{ matrix.package-manager }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    strategy:
      fail-fast: false
      matrix:
        verifier:
          [
            addon,
            addon-treeshake,
            # binary,
            classification,
            gateway,
            middleware-and-permissions,
            treeshaking,
            types,
            secrets,
            workflows,
            variables,
            functions,
            hmr,
            dev-bun,
            deploy-cloudflare,
            deploy-serverless,
            deploy-azure,
            deploy-standalone,
            better-auth,
            bun-server,
            webhooks,
          ]
        package-manager: [yarn, bun]
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: cd verifiers/${{ matrix.verifier }} && ${{ matrix.package-manager == 'bun' && 'bun run' || 'yarn' }} test

  verifiers-binary:
    name: Binary (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    needs: build
    strategy:
      fail-fast: false
      matrix:
        # windows-latest excluded: its pre-installed global Yarn 1.22 shadows
        # Corepack's Yarn 4 in the shared setup action, breaking `yarn install`.
        # The pikku-windows-x64.exe is still cross-compiled and published on each
        # release (see packages/cli/build.sh).
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Run binary verifier
        shell: bash
        run: cd verifiers/binary && yarn test

  # The workflow verifier's pg/redis runners need real queue + storage backends,
  # so they can't run in the plain `verifiers` job. This job gives them Postgres
  # (KyselyWorkflowService + pg-boss) and Redis (RedisWorkflowService + bullmq)
  # and asserts every node's state — provenance + cycles — on both transports.
  verifiers-workflows-db:
    name: Verifiers (workflows, db-backed)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    services:
      redis:
        image: redis
        ports:
          - 6379:6379
      postgres:
        image: postgres
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: pikku_queue
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: cd verifiers/workflows && yarn test:db
    env:
      DATABASE_URL: postgres://postgres:password@localhost:5432/pikku_queue
      REDIS_URL: redis://localhost:6379

  templates:
    name: Templates (${{ matrix.version }}, ${{ matrix.template }}, ${{ matrix.package-manager }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    services:
      redis:
        image: redis
        ports:
          - 6379:6379
      postgres:
        image: postgres
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: pikku_workspace_starter
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    strategy:
      fail-fast: false
      matrix:
        version: [24]
        template:
          [
            express,
            express-middleware,
            fastify,
            fastify-plugin,
            uws,
            ws,
            aws-lambda,
            aws-lambda-websocket,
            cloudflare-workers,
            cloudflare-websocket,
            nextjs,
            mcp-server,
            pg-boss,
            bullmq,
            workflows-bullmq,
            workflows-pg-boss,
            remote-rpc-pg,
            remote-rpc-redis,
            ai-postgres,
          ]
        package-manager: [yarn]
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
        with:
          node-version: ${{ matrix.version }}
      - name: Test template
        timeout-minutes: 5
        run: ./scripts/test-template.sh "$TEMPLATE_NAME" "$TEMPLATE_VERSION"
        env:
          TEMPLATE_NAME: ${{ matrix.template }}
          TEMPLATE_VERSION: ${{ github.ref_name }}
    env:
      SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}
      DATABASE_URL: postgres://postgres:password@localhost:5432/pikku_workspace_starter
      REDIS_URL: redis://localhost:6379
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SLS_TELEMETRY_DISABLED: 1
      SLS_NOTIFICATIONS_MODE: off

  templates-no-services:
    name: Templates (${{ matrix.version }}, ${{ matrix.template }}, ${{ matrix.package-manager }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    strategy:
      fail-fast: false
      matrix:
        version: [24]
        template: [cli]
        package-manager: [yarn]
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
        with:
          node-version: ${{ matrix.version }}
      - name: Test template
        timeout-minutes: 5
        run: ./scripts/test-template.sh "$TEMPLATE_NAME" "$TEMPLATE_VERSION"
        env:
          TEMPLATE_NAME: ${{ matrix.template }}
          TEMPLATE_VERSION: ${{ github.ref_name }}
    env:
      SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SLS_TELEMETRY_DISABLED: 1
      SLS_NOTIFICATIONS_MODE: off

  template-runtime-targets:
    name: Template Functions Runtimes (${{ matrix.version }}, ${{ matrix.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    services:
      elasticmq:
        image: softwaremill/elasticmq-native
        ports:
          - 9324:9324
    strategy:
      fail-fast: false
      matrix:
        version: [24]
        target: [dev, standalone]
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
        with:
          node-version: ${{ matrix.version }}
      - name: Test functions template runtime target
        timeout-minutes: 5
        run: cd templates/functions && yarn test:runtime ${{ matrix.target }}
        env:
          AWS_ACCESS_KEY_ID: local
          AWS_SECRET_ACCESS_KEY: local
          AWS_REGION: us-east-1
          SLS_TELEMETRY_DISABLED: 1
          SLS_NOTIFICATIONS_MODE: off

  release:
    name: Release
    runs-on: ubuntu-latest
    needs:
      [
        validate-deps,
        lint,
        unit-tests,
        verifiers,
        verifiers-workflows-db,
        templates,
        templates-no-services,
        template-runtime-targets,
        e2e,
      ]
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      publishedPackages: ${{ steps.changesets.outputs.publishedPackages }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: node .github/changeset-version.cjs
          publish: yarn release
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          HUSKY: '0'
      - name: Upload CLI native binaries to GitHub Release
        if: steps.changesets.outputs.published == 'true'
        id: upload-binaries
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          published='${{ steps.changesets.outputs.publishedPackages }}'
          cli_version=$(echo "$published" | node -e "
            const pkgs = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            const cli = pkgs.find(p => p.name === '@pikku/cli');
            if (cli) process.stdout.write(cli.version);
          ")
          if [ -z "$cli_version" ]; then
            echo "@pikku/cli was not published this run — skipping binary upload"
            exit 0
          fi
          echo "cli_version=${cli_version}" >> "$GITHUB_OUTPUT"
          tag="@pikku/cli@${cli_version}"
          echo "Uploading binaries for $tag"
          for f in packages/cli/release/binaries/*; do
            [ -f "$f" ] || continue
            echo "  Uploading $(basename $f)"
            gh release upload "$tag" "$f" --clobber
          done
      - name: Update Homebrew tap
        if: steps.upload-binaries.outputs.cli_version != ''
        shell: bash
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          CLI_VERSION="${{ steps.upload-binaries.outputs.cli_version }}"
          ARM_SHA=$(sha256sum packages/cli/release/binaries/pikku-darwin-arm64 | cut -d' ' -f1)
          X64_SHA=$(sha256sum packages/cli/release/binaries/pikku-darwin-x64 | cut -d' ' -f1)
          ENCODED_TAG="%40pikku%2Fcli%40${CLI_VERSION}"

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/pikkujs/homebrew-pikku.git" tap
          cd tap

          mkdir -p Casks
          cat > Casks/pikku.rb << CASK
          cask "pikku" do
            version "${CLI_VERSION}"

            on_arm do
              url "https://github.com/pikkujs/pikku/releases/download/${ENCODED_TAG}/pikku-darwin-arm64"
              sha256 "${ARM_SHA}"
              binary "pikku-darwin-arm64", target: "pikku"
            end
            on_intel do
              url "https://github.com/pikkujs/pikku/releases/download/${ENCODED_TAG}/pikku-darwin-x64"
              sha256 "${X64_SHA}"
              binary "pikku-darwin-x64", target: "pikku"
            end

            name "Pikku"
            desc "Code generation tool for type-safe backend development"
            homepage "https://pikku.dev"
          end
          CASK

          git config user.email "ci@pikku.dev"
          git config user.name "Pikku CI"
          git add Casks/pikku.rb
          git commit -m "pikku ${CLI_VERSION}"
          git push

  sync-templates-stackblitz:
    name: Sync Templates
    runs-on: ubuntu-latest
    needs: release
    environment: sync-templates-approval
    strategy:
      fail-fast: false
      matrix:
        version: [24]
        template:
          [
            express,
            express-middleware,
            fastify,
            fastify-plugin,
            uws,
            ws,
            aws-lambda,
            aws-lambda-websocket,
            cloudflare-workers,
            cloudflare-websocket,
            nextjs,
            mcp-server,
            cli,
            pg-boss,
            bullmq,
            workflows-bullmq,
            workflows-pg-boss,
            remote-rpc-pg,
            remote-rpc-redis,
          ]
    steps:
      - name: Check out repository code
        uses: actions/checkout@v7

      - name: Create Template
        run: npm create pikku@latest -- --template ${{ matrix.template }} --version ${{ github.ref_name }} --name ../test-app --install --package-manager npm --stackblitz

      - name: Sync template repository
        run: ./scripts/sync-template-repos.sh ${{ matrix.template }} --apply --token ${{ secrets.SYNC_TOKEN_GITHUB }}
