name: CI

on:
  push:
    branches-ignore:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-deps:
    name: Validate Package Deps
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check published deps for workspace protocol
        run: node scripts/check-no-workspace-protocol.mjs

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          download-build: 'false'
      - uses: ./.github/actions/build

  codegen-perf:
    name: Codegen Perf (500 functions ≤ 30s)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Run codegen perf gate
        run: npx tsx benchmarks/bench-codegen-perf.ts

  e2e:
    name: E2E Standard
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
    timeout-minutes: 10
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Install native build tools
        run: apt-get update && apt-get install -y build-essential python3
      - uses: ./.github/actions/setup
      - uses: ./.github/actions/e2e-codegen
      - name: Run e2e tests
        run: yarn test:e2e --force-exit

  # e2e-ai:
  #   name: E2E AI
  #   runs-on: ubuntu-latest
  #   container:
  #     image: mcr.microsoft.com/playwright:v1.58.2-noble
  #   timeout-minutes: 10
  #   needs: [e2e, verifiers, templates]
  #   steps:
  #     - uses: actions/checkout@v4
  #     - name: Install native build tools
  #       run: apt-get update && apt-get install -y build-essential python3
  #     - uses: ./.github/actions/setup
  #     - uses: ./.github/actions/e2e-codegen
  #     - name: Run AI e2e tests
  #       run: yarn test:e2e:ai
  #       env:
  #         OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

  verifiers:
    name: Verifiers (${{ matrix.verifier }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    strategy:
      fail-fast: false
      matrix:
        verifier:
          [
            addon,
            classification,
            gateway,
            middleware-and-permissions,
            treeshaking,
            types,
            secrets,
            workflows,
            variables,
            functions,
            hmr,
            deploy-cloudflare,
            deploy-serverless,
            deploy-azure,
            deploy-standalone,
            better-auth,
          ]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: cd verifiers/${{ matrix.verifier }} && yarn test

  verifier-coverage:
    name: Verifier Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Run functions verifier with coverage
        run: cd verifiers/functions && yarn test:coverage
      - name: Upload verifier coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: verifiers/functions/coverage/lcov.info
          flags: verifiers
          name: verifier-coverage
        continue-on-error: true

  unit-coverage:
    name: Unit Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Run package unit tests with coverage
        # --enable-source-maps so tsx-transpiled line numbers map back to the
        # original .ts before lcov is written. A single package's test failure
        # must not halt the sweep, so each run is isolated with `|| warning`.
        env:
          NODE_OPTIONS: --enable-source-maps
        run: |
          while IFS= read -r script; do
            dir=$(dirname "$script")
            echo "::group::coverage ${dir}"
            (cd "$dir" && bash run-tests.sh --coverage) || echo "::warning::unit tests failed in ${dir}"
            echo "::endgroup::"
          done < <(find packages -name run-tests.sh -not -path '*/node_modules/*' | sort)
      - name: Merge lcov reports and re-root paths to repo root
        # Each package writes lcov.info with package-relative SF paths (src/...).
        # Prefix them with the package directory so Codecov maps them to the
        # correct file in a monorepo where many packages share src/index.ts.
        run: |
          : > unit-lcov.info
          while IFS= read -r f; do
            dir=$(dirname "$f")
            sed "s#^SF:#SF:${dir}/#" "$f" >> unit-lcov.info
          done < <(find packages -name lcov.info -not -path '*/node_modules/*' | sort)
          echo "Merged $(grep -c '^SF:' unit-lcov.info || echo 0) source files into unit-lcov.info"
      - name: Upload unit coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: unit-lcov.info
          flags: unit
          name: unit-coverage
        continue-on-error: true

  templates:
    name: Templates (${{ matrix.version }}, ${{ matrix.template }}, ${{ matrix.package-manager }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    services:
      redis:
        image: redis
        ports:
          - 6379:6379
      postgres:
        image: postgres
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: pikku_workspace_starter
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    strategy:
      fail-fast: false
      matrix:
        version: [24]
        template:
          [
            express,
            express-middleware,
            fastify,
            fastify-plugin,
            uws,
            ws,
            aws-lambda,
            aws-lambda-websocket,
            cloudflare-workers,
            cloudflare-websocket,
            nextjs,
            mcp-server,
            pg-boss,
            bullmq,
            workflows-bullmq,
            workflows-pg-boss,
            remote-rpc-pg,
            remote-rpc-redis,
            ai-postgres,
          ]
        package-manager: [yarn]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          node-version: ${{ matrix.version }}
      - name: Test template
        timeout-minutes: 2
        run: ./scripts/test-template.sh ${{ matrix.template }} ${{ github.ref_name }}
        env:
          TEMPLATE_V8_COVERAGE_DIR: ${{ runner.temp }}/template-coverage/${{ matrix.template }}/raw
      - name: Generate template coverage report
        if: always()
        run: |
          if find "${{ runner.temp }}/template-coverage/${{ matrix.template }}/raw" -type f -name '*.json' -print -quit >/dev/null 2>&1; then
            npx --yes c8@11.0.0 report \
              --temp-directory "${{ runner.temp }}/template-coverage/${{ matrix.template }}/raw" \
              --reporter=lcov \
              --report-dir "${{ runner.temp }}/template-coverage/${{ matrix.template }}/report" \
              --exclude '.pikku/**' \
              --exclude 'client/**' \
              --exclude 'src/tests/**'
          fi
      - name: Upload template coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: ${{ runner.temp }}/template-coverage/${{ matrix.template }}/report/lcov.info
          flags: templates
          name: template-${{ matrix.template }}
        continue-on-error: true
    env:
      SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}
      DATABASE_URL: postgres://postgres:password@localhost:5432/pikku_workspace_starter
      REDIS_URL: redis://localhost:6379
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SLS_TELEMETRY_DISABLED: 1
      SLS_NOTIFICATIONS_MODE: off
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  templates-no-services:
    name: Templates (${{ matrix.version }}, ${{ matrix.template }}, ${{ matrix.package-manager }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    strategy:
      fail-fast: false
      matrix:
        version: [24]
        template: [cli]
        package-manager: [yarn]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          node-version: ${{ matrix.version }}
      - name: Test template
        timeout-minutes: 2
        run: ./scripts/test-template.sh ${{ matrix.template }} ${{ github.ref_name }}
        env:
          TEMPLATE_V8_COVERAGE_DIR: ${{ runner.temp }}/template-coverage/${{ matrix.template }}/raw
      - name: Generate template coverage report
        if: always()
        run: |
          if find "${{ runner.temp }}/template-coverage/${{ matrix.template }}/raw" -type f -name '*.json' -print -quit >/dev/null 2>&1; then
            npx --yes c8@11.0.0 report \
              --temp-directory "${{ runner.temp }}/template-coverage/${{ matrix.template }}/raw" \
              --reporter=lcov \
              --report-dir "${{ runner.temp }}/template-coverage/${{ matrix.template }}/report" \
              --exclude '.pikku/**' \
              --exclude 'client/**' \
              --exclude 'src/tests/**'
          fi
      - name: Upload template coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: ${{ runner.temp }}/template-coverage/${{ matrix.template }}/report/lcov.info
          flags: templates
          name: template-${{ matrix.template }}
        continue-on-error: true
    env:
      SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SLS_TELEMETRY_DISABLED: 1
      SLS_NOTIFICATIONS_MODE: off
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  template-runtime-targets:
    name: Template Functions Runtimes (${{ matrix.version }}, ${{ matrix.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    services:
      elasticmq:
        image: softwaremill/elasticmq-native
        ports:
          - 9324:9324
    strategy:
      fail-fast: false
      matrix:
        version: [24]
        target: [dev, standalone]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          node-version: ${{ matrix.version }}
      - name: Test functions template runtime target
        timeout-minutes: 5
        run: cd templates/functions && yarn test:runtime ${{ matrix.target }}
        env:
          AWS_ACCESS_KEY_ID: local
          AWS_SECRET_ACCESS_KEY: local
          AWS_REGION: us-east-1
          SLS_TELEMETRY_DISABLED: 1
          SLS_NOTIFICATIONS_MODE: off
