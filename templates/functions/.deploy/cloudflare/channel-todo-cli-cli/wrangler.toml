#:schema node_modules/wrangler/config-schema.json
name = "functions-channel-todo-cli-cli"
main = "bundle.js"
compatibility_date = "2024-12-18"
compatibility_flags = ["nodejs_compat_v2"]

[observability]
enabled = true

[[durable_objects.bindings]]
name = "WEBSOCKET_HIBERNATION_SERVER"
class_name = "WebSocketHibernationServer"

[[migrations]]
tag = "v1"
new_classes = ["WebSocketHibernationServer"]

[[services]]
binding = "CLI_HELP"
service = "functions-cli-help"

[[services]]
binding = "CLI_RAW"
service = "functions-cli-raw"

[[services]]
binding = "LIST_TODOS"
service = "functions-list-todos"

[[services]]
binding = "CREATE_TODO"
service = "functions-create-todo"

[[services]]
binding = "GET_TODO"
service = "functions-get-todo"

[[services]]
binding = "COMPLETE_TODO"
service = "functions-complete-todo"

[[services]]
binding = "DELETE_TODO"
service = "functions-delete-todo"
