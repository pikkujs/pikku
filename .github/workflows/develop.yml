name: Main

on:
  push:
    branches-ignore:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      - run: corepack enable
        shell: bash
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn
      - run: yarn install
      # - name: Check changesets
      #   if: github.event_name == 'pull_request'
      #   run: bash scripts/check-changesets.sh origin/main
      - name: Check formatting
        run: yarn prettier
      - name: Lint
        run: yarn lint
      - name: Build packages
        run: yarn build:packages
      - name: Generate pikku files
        run: yarn pikku
      - name: Build addons
        run: yarn build:addons
      - name: Regenerate schemas after bootstrap
        run: yarn pikku
      - name: Run tests
        run: yarn test:coverage
      - name: Generate and type-check console
        run: cd packages/console && yarn generate && yarn tsc --noEmit
      - name: Build console
        run: yarn build:console

      - name: Generate pikku files for verifiers
        run: yarn workspaces foreach -p -A --include 'verifiers/**' run pikku
      - name: Build verifiers
        run: yarn build:verifiers
      - name: Build function-addon template
        run: cd templates/function-addon && yarn pikku && yarn build
      - name: Build templates
        run: yarn build:templates

      - name: Save build output (for later jobs)
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            packages/**/dist
            packages/**/bin
            templates/**/.pikku
            templates/**/dist
            verifiers/**/.pikku
            verifiers/**/dist
          include-hidden-files: true
          retention-days: 1

      - name: Coveralls GitHub Action
        uses: coverallsapp/github-action@v2.3.4
        continue-on-error: true

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      - run: corepack enable
        shell: bash
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn
      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: build-output
      - run: yarn install
      - name: Generate pikku files for e2e addons
        run: |
          cd packages/addon/pikku-console && npx pikku all
          cd ../../..
          cd packages/addon/pikku-graph && npx pikku all
          cd ../../..
          cd e2e/packages/todos && npx pikku all
          cd ../../..
          cd e2e/packages/emails && npx pikku all
      - name: Generate pikku files for e2e project
        run: cd e2e && npx pikku all
      - name: Install Playwright
        run: npx playwright install --with-deps chromium
      - name: Run e2e tests
        run: yarn test:e2e
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

  verifiers:
    name: Verifiers
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    strategy:
      fail-fast: false
      matrix:
        verifier:
          [
            addon,
            gateway,
            middleware-and-permissions,
            treeshaking,
            types,
            secrets,
            workflows,
            variables,
            functions,
          ]
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      - run: corepack enable
        shell: bash
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn
      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: build-output
      - run: yarn install
      - run: cd verifiers/${{ matrix.verifier }} && yarn test

  templates:
    name: Templates
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    services:
      redis:
        image: redis
        ports:
          - 6379:6379
      postgres:
        image: postgres
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: pikku_workspace_starter
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    strategy:
      fail-fast: false
      matrix:
        version: [24]
        template:
          [
            express,
            express-middleware,
            fastify,
            fastify-plugin,
            uws,
            ws,
            aws-lambda,
            aws-lambda-websocket,
            cloudflare-workers,
            cloudflare-websocket,
            nextjs,
            mcp-server,
            cli,
            pg-boss,
            bullmq,
            workflows-bullmq,
            workflows-pg-boss,
            remote-rpc-pg,
            remote-rpc-redis,
            ai-postgres,
          ]
        package-manager: [yarn]
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      - run: corepack enable
        shell: bash
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.version }}
          cache: yarn
      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: build-output
      - run: yarn install
      - name: Test template
        timeout-minutes: 2
        run: ./scripts/test-template.sh ${{ matrix.template }} ${{ github.ref_name }}
    env:
      SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}
      DATABASE_URL: postgres://postgres:password@localhost:5432/pikku_workspace_starter
      REDIS_URL: redis://localhost:6379
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SLS_TELEMETRY_DISABLED: 1
      SLS_NOTIFICATIONS_MODE: off
