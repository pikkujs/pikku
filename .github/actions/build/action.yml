name: Build
description: Build all packages, generate pikku files, build templates + console, and upload build artifact

runs:
  using: composite
  steps:
    - name: Restore TypeScript build cache
      uses: actions/cache@v6
      with:
        # tsc -b is incremental: given the prior tsconfig.tsbuildinfo + emitted
        # dist it only recompiles projects whose inputs changed. Key on all
        # package sources + tsconfigs + the lockfile so any change busts it, with
        # a prefix restore-key so unrelated changes still reuse the newest cache.
        path: |
          packages/**/tsconfig.tsbuildinfo
          packages/**/dist
        key: ts-build-${{ hashFiles('packages/**/src/**/*.ts', 'packages/**/tsconfig*.json', 'yarn.lock') }}
        restore-keys: |
          ts-build-
    - name: Build packages
      shell: bash
      run: |
        start=$SECONDS
        yarn build:packages
        echo "::notice::⏱ Build packages: $((SECONDS - start))s"
    - name: Build addons
      shell: bash
      run: |
        start=$SECONDS
        yarn build:addons
        echo "::notice::⏱ Build addons: $((SECONDS - start))s"
    - name: Build function-addon template
      shell: bash
      run: |
        start=$SECONDS
        cd templates/function-addon && yarn pikku && yarn build
        echo "::notice::⏱ Build function-addon template: $((SECONDS - start))s"
    - name: Generate pikku files
      shell: bash
      run: |
        start=$SECONDS
        yarn pikku
        echo "::notice::⏱ Generate pikku files: $((SECONDS - start))s"
    - name: Build templates
      shell: bash
      run: |
        start=$SECONDS
        yarn build:templates
        echo "::notice::⏱ Build templates: $((SECONDS - start))s"
    - name: Generate and type-check console
      shell: bash
      run: |
        start=$SECONDS
        cd packages/console && yarn generate && yarn tsc --noEmit
        echo "::notice::⏱ Console type-check: $((SECONDS - start))s"
    - name: Build console
      shell: bash
      run: |
        start=$SECONDS
        yarn build:console
        echo "::notice::⏱ Build console: $((SECONDS - start))s"

    - name: Save build output (for later jobs)
      uses: actions/upload-artifact@v7
      with:
        name: build-output
        path: |
          packages/**/dist/**
          packages/**/bin/**
          packages/**/.pikku/**
          templates/**/.pikku/**
          templates/**/dist/**
        include-hidden-files: true
        retention-days: 1
