name: Build
description: Build all packages, run tests, generate pikku files, and upload build artifact

runs:
  using: composite
  steps:
    - name: Check formatting
      shell: bash
      run: |
        start=$SECONDS
        yarn prettier
        echo "::notice::⏱ Check formatting: $((SECONDS - start))s"
    - name: Lint
      shell: bash
      run: |
        start=$SECONDS
        yarn lint
        echo "::notice::⏱ Lint: $((SECONDS - start))s"
    - name: Build packages
      shell: bash
      run: |
        start=$SECONDS
        yarn build:packages
        echo "::notice::⏱ Build packages: $((SECONDS - start))s"
    - name: Generate pikku files
      shell: bash
      run: |
        start=$SECONDS
        yarn pikku
        echo "::notice::⏱ Generate pikku files: $((SECONDS - start))s"
    - name: Build addons
      shell: bash
      run: |
        start=$SECONDS
        yarn build:addons
        echo "::notice::⏱ Build addons: $((SECONDS - start))s"
    - name: Regenerate schemas after bootstrap
      shell: bash
      run: |
        start=$SECONDS
        yarn pikku
        echo "::notice::⏱ Regenerate schemas: $((SECONDS - start))s"
    - name: Build function-addon template
      shell: bash
      run: |
        start=$SECONDS
        cd templates/function-addon && yarn pikku && yarn build
        echo "::notice::⏱ Build function-addon template: $((SECONDS - start))s"
    - name: Final pikku regeneration before template builds
      shell: bash
      run: |
        start=$SECONDS
        yarn pikku
        echo "::notice::⏱ Final pikku regeneration: $((SECONDS - start))s"
    - name: Build templates
      shell: bash
      run: |
        start=$SECONDS
        yarn build:templates
        echo "::notice::⏱ Build templates: $((SECONDS - start))s"
    - name: Run tests
      shell: bash
      run: |
        start=$SECONDS
        yarn test:coverage
        echo "::notice::⏱ Run tests: $((SECONDS - start))s"
    - name: Generate and type-check console
      shell: bash
      run: |
        start=$SECONDS
        cd packages/console && yarn generate && yarn tsc --noEmit
        echo "::notice::⏱ Console type-check: $((SECONDS - start))s"
    - name: Build console
      shell: bash
      run: |
        start=$SECONDS
        yarn build:console
        echo "::notice::⏱ Build console: $((SECONDS - start))s"

    - name: Save build output (for later jobs)
      uses: actions/upload-artifact@v4
      with:
        name: build-output
        path: |
          packages/**/dist
          packages/**/bin
          templates/**/.pikku
          templates/**/dist
        include-hidden-files: true
        retention-days: 1

    - name: Coveralls GitHub Action
      uses: coverallsapp/github-action@v2.3.4
      continue-on-error: true
